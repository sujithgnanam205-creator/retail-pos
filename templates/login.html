<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Retail POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans text-gray-800" x-data="loginSystem">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-500 mb-2">Retail POS</h1>
            <p class="text-gray-500">Please sign in to your account</p>
        </div>

        <div x-show="errorMessage" class="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center font-bold" x-text="errorMessage"></div>

        <form @submit.prevent="attemptLogin" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input type="text" x-model="username" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="e.g., admin_divyesh" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" x-model="password" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold py-3 rounded-lg shadow-lg transition-transform transform hover:scale-[1.02]">
                Secure Login 🔒
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <p>Test Accounts: admin_divyesh / cashier_sujith</p>
            <p>Password: admin123</p>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginSystem', () => ({
                username: '',
                password: '',
                errorMessage: '',
                
                attemptLogin() {
                    fetch('http://127.0.0.1:5000/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: this.username, password: this.password })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.error) {
                            this.errorMessage = data.error;
                        } else {
                            // Save user to browser memory and go to POS!
                            localStorage.setItem('pos_user', JSON.stringify(data));
                            window.location.href = '/'; 
                        }
                    });
                }
            }))
        })
    </script>
</body>
</html>
