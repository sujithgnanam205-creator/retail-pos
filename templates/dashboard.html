<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-800" x-data="dashboard">

    <header class="mb-8 flex justify-between items-center border-b pb-4">
        <div>
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-500">Admin Tools & Analytics</h1>
            <p class="text-gray-500 mt-2">Inventory Management & Live Data</p>
        </div>
        <a href="/" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg shadow">🔙 Back to Register</a>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
        
        <div class="col-span-1 flex flex-col gap-6">
            <div class="bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl shadow-lg p-6 text-white text-center">
                <h2 class="text-lg font-semibold opacity-90 mb-1">Total Store Revenue</h2>
                <p class="text-4xl font-black tracking-tight" x-text="'₹' + totalRevenue"></p>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                <h2 class="text-lg font-bold text-green-600 mb-3">📦 Restock Item</h2>
                <form @submit.prevent="restockItem" class="space-y-3">
                    <select x-model="restockProductId" class="w-full border p-2 rounded text-sm" required>
                        <option value="">-- Choose Item --</option>
                        <template x-for="p in allProducts" :key="p.product_id"><option :value="p.product_id" x-text="p.product_name + ' (Stock: ' + p.stock_quantity + ')'"></option></template>
                    </select>
                    <input type="number" x-model="restockAmount" min="1" placeholder="Quantity" class="w-full border p-2 rounded text-sm" required>
                    <button type="submit" class="w-full bg-green-500 hover:bg-green-600 transition-colors text-white font-bold py-2 rounded text-sm">Add Stock</button>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                <h2 class="text-lg font-bold text-blue-600 mb-3">➕ Create New Product</h2>
                <form @submit.prevent="createProduct" class="space-y-3">
                    <input type="text" x-model="newProd.name" placeholder="Product Name" class="w-full border p-2 rounded text-sm" required>
                    <div class="flex gap-2">
                        <input type="number" step="0.01" x-model="newProd.price" placeholder="Price (₹)" class="w-1/2 border p-2 rounded text-sm" required>
                        <input type="number" x-model="newProd.stock" placeholder="Initial Stock" class="w-1/2 border p-2 rounded text-sm" required>
                    </div>
                    <select x-model="newProd.category_id" class="w-full border p-2 rounded text-sm" required>
                        <option value="">-- Category --</option>
                        <option value="1">Electronics</option>
                        <option value="2">Stationery</option>
                        <option value="3">Snacks</option>
                    </select>
                    <input type="url" x-model="newProd.image_url" placeholder="Image URL (Optional)" class="w-full border p-2 rounded text-sm">
                    <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 transition-colors text-white font-bold py-2 rounded text-sm">Save Product</button>
                </form>
            </div>
        </div>

        <div class="col-span-2 bg-white rounded-xl shadow-md p-6 border border-gray-100 flex flex-col">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Sales by Product Category</h2>
            <div class="relative flex-1 min-h-[300px]"><canvas id="categoryChart"></canvas></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 h-64 overflow-y-auto">
            <h2 class="text-xl font-bold text-red-600 mb-4 sticky top-0 bg-white">🛡️ Security Audit Log</h2>
            <table class="min-w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-600"><tr><th class="p-2">Time</th><th class="p-2">Product</th><th class="p-2">Old</th><th class="p-2">New</th></tr></thead>
                <tbody>
                    <template x-for="log in auditLogs" :key="log.log_id">
                        <tr class="border-b"><td class="p-2" x-text="log.time"></td><td class="p-2" x-text="log.product_name"></td><td class="p-2 text-red-500" x-text="log.old_stock"></td><td class="p-2 text-green-500" x-text="log.new_stock"></td></tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 h-64 overflow-y-auto">
            <h2 class="text-xl font-bold text-orange-500 mb-4 sticky top-0 bg-white">⚠️ Depletion Warnings</h2>
            <div class="space-y-3">
                <template x-for="item in predictions" :key="item.product_name">
                    <div class="bg-orange-50 border-l-4 border-orange-500 p-3 rounded flex justify-between">
                        <div><h3 class="font-bold text-sm text-gray-800" x-text="item.product_name"></h3><p class="text-xs text-red-500" x-text="'Stock: ' + item.stock_quantity"></p></div>
                        <span class="bg-white text-orange-600 font-bold text-[10px] px-2 py-1 rounded-full border border-orange-200 h-min" x-text="item.total_sold + ' sold'"></span>
                    </div>
                </template>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 h-64 overflow-y-auto">
            <h2 class="text-xl font-bold text-purple-600 mb-4 sticky top-0 bg-white">🏆 CRM Leaderboard</h2>
            <table class="min-w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-600"><tr><th class="p-2">Phone Number</th><th class="p-2 text-right">Loyalty Points</th></tr></thead>
                <tbody>
                    <template x-for="cust in customers" :key="cust.phone_number">
                        <tr class="border-b">
                            <td class="p-2 font-bold text-gray-700" x-text="cust.phone_number"></td>
                            <td class="p-2 text-purple-600 font-black text-right" x-text="cust.points + ' pts'"></td>
                        </tr>
                    </template>
                    <tr x-show="customers.length === 0"><td colspan="2" class="p-4 text-center text-gray-400">No loyalty data yet.</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('dashboard', () => ({
                totalRevenue: 0, auditLogs: [], predictions: [], allProducts: [], customers: [],
                restockProductId: '', restockAmount: 1,
                newProd: { name: '', price: '', stock: '', category_id: '', image_url: '' },
                
                init() {
                    const user = JSON.parse(localStorage.getItem('pos_user'));
                    if(!user || user.role !== 'admin') { window.location.href = '/'; return; }
                    this.fetchData();
                },

                fetchData() {
                    fetch('http://127.0.0.1:5000/api/sales').then(res => res.json()).then(data => {
                        this.totalRevenue = data.total_revenue.toFixed(2);
                        if(window.myChart) window.myChart.destroy();
                        this.renderChart(data.category_sales);
                    });
                    fetch('http://127.0.0.1:5000/api/audit_logs').then(res => res.json()).then(data => this.auditLogs = data);
                    fetch('http://127.0.0.1:5000/api/predictions').then(res => res.json()).then(data => this.predictions = data);
                    fetch('http://127.0.0.1:5000/api/products').then(res => res.json()).then(data => this.allProducts = data);
                    
                    // Fetch CRM Data
                    fetch('http://127.0.0.1:5000/api/customers').then(res => res.json()).then(data => this.customers = data);
                },

                restockItem() {
                    fetch('http://127.0.0.1:5000/api/restock', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ product_id: parseInt(this.restockProductId), quantity: parseInt(this.restockAmount) }) })
                    .then(() => { this.restockProductId = ''; this.restockAmount = 1; this.fetchData(); });
                },

                createProduct() {
                    fetch('http://127.0.0.1:5000/api/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.newProd) })
                    .then(res => res.json()).then(data => {
                        alert(data.message);
                        this.newProd = { name: '', price: '', stock: '', category_id: '', image_url: '' };
                        this.fetchData();
                    });
                },

                renderChart(salesData) {
                    const ctx = document.getElementById('categoryChart').getContext('2d');
                    window.myChart = new Chart(ctx, { type: 'bar', data: { labels: salesData.map(i => i.category_name), datasets: [{ data: salesData.map(i => i.category_total), backgroundColor: ['rgba(147, 51, 234, 0.7)', 'rgba(59, 130, 246, 0.7)', 'rgba(16, 185, 129, 0.7)'], borderRadius: 6 }] }, options: { plugins: { legend: { display: false } }, maintainAspectRatio: false } });
                }
            }))
        })
    </script>
</body>
</html>
