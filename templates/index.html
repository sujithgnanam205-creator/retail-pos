<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-800" x-data="posSystem">

    <header class="mb-6 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-500">Retail POS</h1>
            <p class="text-sm text-gray-500 mt-1" x-text="'Cashier: ' + currentUser.username"></p>
        </div>
        
        <div class="flex-1 max-w-md mx-8">
            <input type="text" x-model="searchQuery" placeholder="🔍 Search products..." class="w-full px-4 py-2 rounded-full border border-gray-300 focus:ring-2 focus:ring-purple-500 outline-none bg-gray-50">
        </div>

        <div class="flex gap-3">
            <a x-show="currentUser.role === 'admin'" href="/dashboard" class="bg-purple-100 text-purple-700 font-bold py-2 px-4 rounded-lg flex items-center">📊 Dashboard</a>
            <button @click="isCartOpen = !isCartOpen" class="bg-blue-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2">🛒 Cart <span class="bg-white text-blue-600 rounded-full px-2 py-0.5 text-xs" x-text="cart.length"></span></button>
            <button @click="logout()" class="bg-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg">Logout</button>
        </div>
    </header>

    <div class="mb-6 flex gap-2 overflow-x-auto pb-2">
        <button @click="selectedCategory = 'All'" :class="selectedCategory === 'All' ? 'bg-gray-800 text-white' : 'bg-white text-gray-600 hover:bg-gray-100'" class="px-4 py-2 rounded-full font-bold text-sm shadow-sm border border-gray-200">All Products</button>
        <template x-for="category in categories" :key="category">
            <button @click="selectedCategory = category" :class="selectedCategory === category ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-100'" class="px-4 py-2 rounded-full font-bold text-sm shadow-sm border border-gray-200" x-text="category"></button>
        </template>
    </div>

    <div class="flex gap-8 relative">
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start h-min">
            <template x-for="product in filteredProducts" :key="product.product_id">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition-all flex flex-col overflow-hidden">
                    <div class="h-48 w-full bg-gray-100 border-b border-gray-100 relative group">
                        <img :src="product.image_url" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-3">
                            <h2 class="text-lg font-bold text-gray-800" x-text="product.product_name"></h2>
                            <span class="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-1 rounded uppercase" x-text="product.category_name"></span>
                        </div>
                        <div class="flex justify-between items-end mt-auto pt-2">
                            <p class="text-xl font-black text-green-600" x-text="'₹' + product.price"></p>
                            <p class="text-xs font-bold text-gray-500" x-text="'Stock: ' + product.stock_quantity"></p>
                        </div>
                        <button @click="addToCart(product)" class="w-full mt-4 bg-gray-100 hover:bg-blue-600 hover:text-white font-bold py-2 px-4 rounded-lg">Add to Cart</button>
                    </div>
                </div>
            </template>
            <div x-show="filteredProducts.length === 0" class="col-span-full text-center py-10 text-gray-500 font-bold">No products found matching your search.</div>
        </div>

        <div x-show="isCartOpen" class="w-96 bg-white rounded-xl shadow-2xl border border-gray-200 p-6 flex flex-col sticky top-8 h-[calc(100vh-4rem)]">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 class="text-2xl font-bold text-gray-800">Current Order</h2>
                <button @click="isCartOpen = false" class="text-red-500 font-bold text-xl">✕</button>
            </div>
            <div x-show="recommendation" class="mb-4 bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                <p class="text-xs text-yellow-600 font-bold uppercase mb-1">✨ Smart Suggestion</p>
                <p class="text-sm text-gray-700">Usually bought with <strong x-text="recommendation"></strong>!</p>
            </div>
            <div class="flex-1 overflow-y-auto space-y-3">
                <template x-for="item in cart" :key="item.product_id">
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-gray-100">
                        <div class="flex items-center gap-3">
                            <img :src="item.image_url" class="w-10 h-10 rounded object-cover border border-gray-200">
                            <div>
                                <p class="font-bold text-sm text-gray-800" x-text="item.product_name"></p>
                                <p class="text-xs text-gray-500" x-text="'₹' + item.price + ' x ' + item.quantity"></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-sm text-green-600" x-text="'₹' + (item.price * item.quantity).toFixed(2)"></p>
                            <button @click="removeFromCart(item.product_id)" class="text-red-500 font-bold bg-red-100 px-2 rounded">X</button>
                        </div>
                    </div>
                </template>
            </div>
            
            <div class="border-t pt-4 mt-4">
                <div class="mb-4">
                    <label class="text-xs font-bold text-gray-500 uppercase">Loyalty Program (Optional)</label>
                    <input type="text" x-model="customerPhone" placeholder="Enter Customer Phone" class="w-full mt-1 p-2 border rounded bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-600">Total:</span>
                    <span class="text-2xl font-black text-green-600" x-text="'₹' + cartTotal"></span>
                </div>
                <button @click="checkout()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg" :disabled="cart.length === 0">Checkout 💸</button>
            </div>
        </div>
    </div>

    <div x-show="showReceipt" style="display: none;" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-[400px] border-t-8 border-blue-500">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-widest">Receipt</h2>
                <p class="text-gray-500 text-sm mt-1" x-text="receiptData.date"></p>
                <p class="text-gray-500 text-sm">Order #<span x-text="receiptData.orderId"></span></p>
            </div>
            <div class="border-b border-dashed border-gray-300 pb-4 mb-4 space-y-2">
                <template x-for="item in receiptData.items">
                    <div class="flex justify-between text-sm">
                        <span x-text="item.quantity + 'x ' + item.product_name"></span>
                        <span x-text="'₹' + (item.price * item.quantity).toFixed(2)"></span>
                    </div>
                </template>
            </div>
            <div class="flex justify-between items-center text-xl font-black mb-4 text-gray-800">
                <span>TOTAL</span>
                <span x-text="'₹' + receiptData.total"></span>
            </div>
            
            <div x-show="receiptData.points > 0" class="bg-yellow-50 text-yellow-700 text-center text-sm font-bold p-2 rounded mb-6">
                Loyalty Points Earned: +<span x-text="receiptData.points"></span>
            </div>

            <p class="text-center text-xs text-gray-400 mb-6 italic">Served by: <span x-text="currentUser.username"></span></p>
            <div class="flex gap-4">
                <button onclick="window.print()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-2 rounded">🖨️ Print</button>
                <button @click="closeReceipt()" class="flex-1 bg-blue-500 text-white font-bold py-2 rounded">New Order</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('posSystem', () => ({
                currentUser: {}, products: [], cart: [], isCartOpen: true, recommendation: null,
                selectedCategory: 'All', categories: [], searchQuery: '', customerPhone: '', 
                showReceipt: false, receiptData: {},
                
                init() {
                    const user = localStorage.getItem('pos_user');
                    if(!user) { window.location.href = '/login'; return; }
                    this.currentUser = JSON.parse(user);
                    this.fetchProducts();
                },

                fetchProducts() {
                    fetch('http://127.0.0.1:5000/api/products').then(res => res.json()).then(data => {
                        this.products = data;
                        this.categories = [...new Set(data.map(p => p.category_name))]; 
                    });
                },

                get filteredProducts() {
                    let filtered = this.products;
                    if (this.selectedCategory !== 'All') {
                        filtered = filtered.filter(p => p.category_name === this.selectedCategory);
                    }
                    if (this.searchQuery) {
                        filtered = filtered.filter(p => p.product_name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                    }
                    return filtered;
                },
                
                addToCart(product) {
                    const existingItem = this.cart.find(item => item.product_id === product.product_id);
                    if (existingItem) {
                        if (existingItem.quantity < product.stock_quantity) existingItem.quantity++;
                    } else { this.cart.push({ ...product, quantity: 1 }); }
                    this.fetchRecommendation(product.product_id);
                },

                fetchRecommendation(productId) {
                    fetch(`http://127.0.0.1:5000/api/recommend/${productId}`).then(res => res.json())
                        .then(data => { if(data.product_name) this.recommendation = data.product_name; });
                },
                
                removeFromCart(productId) {
                    this.cart = this.cart.filter(item => item.product_id !== productId);
                    if(this.cart.length === 0) this.recommendation = null;
                },
                
                get cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (parseFloat(item.price) * item.quantity), 0).toFixed(2);
                },

                checkout() {
                    if (this.cart.length === 0) return; 
                    const currentTotal = this.cartTotal;
                    const itemsToSave = [...this.cart]; 

                    fetch('http://127.0.0.1:5000/api/checkout', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            cart: this.cart, total: parseFloat(currentTotal), 
                            user_id: this.currentUser.user_id, customer_phone: this.customerPhone 
                        })
                    }).then(res => res.json()).then(data => {
                        if (data.error) alert("Error: " + data.error);
                        else {
                            this.receiptData = {
                                orderId: data.order_id, items: itemsToSave, total: currentTotal,
                                date: new Date().toLocaleString(), points: data.points_earned
                            };
                            this.showReceipt = true; 
                            this.cart = []; this.recommendation = null; this.customerPhone = ''; this.fetchProducts();
                        }
                    });
                },

                closeReceipt() { this.showReceipt = false; this.isCartOpen = false; },
                logout() { localStorage.removeItem('pos_user'); window.location.href = '/login'; }
            }))
        })
    </script>
</body>
</html>
